name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

# Keep Node.js version updated with GitHub Actions default
# Default changed to Node.js 24 on June 2nd, 2026
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4  # Keep this updated to latest major version
        with:
          node-version: '24'  # LTS version aligned with GitHub Actions default
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
